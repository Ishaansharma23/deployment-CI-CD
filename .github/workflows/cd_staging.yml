# step - 1 when should this pipeline run

name: Deploy to Staging

on:
  push:
    branches:
      - "main"

# jab bhi main branch pr kuch push ho tab run these jobs

jobs:
  redeploy_everything:
    runs-on: ubuntu-latest
    name: Redeploy Everything to staging cluster

    # ab jo ye redeploy everything job hai use kya kya krna hoga

    steps:
      - name: SSH into SERVER

        # &> means pipe it into ssh_key file
        # echo yes isliye kr rhe kyuki known host wala scene ara usme
        # host key verification failed ka error aata hai to usko yes krne ke liye we are echoing yes and then we are writing the private key into ssh_key file

        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/ssh_key

          echo "yes" | ssh -i ~/ssh_key ubuntu@13.127.191.19

          cd deployment-CI-CD/ && git pull

          npm install

          npm run build

          pm2 restart all

          EOF